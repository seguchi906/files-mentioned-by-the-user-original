<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>業務データ管理</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>業務データ管理</h1>
        <p>Neon DBに保存された業務情報を編集します。</p>
      </div>
      <div class="header-actions">
        <label class="file-button" title="CSVを初回取り込み">
          <input id="csvInput" type="file" accept=".csv,text/csv">
          CSV取込
        </label>
        <a class="button secondary" href="/api/export.csv" download>CSV出力</a>
        <button id="newButton" class="button primary" type="button">新規追加</button>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="検索と絞り込み">
        <input id="searchInput" type="search" placeholder="業務番号・業務名・発注者・分類で検索">
        <select id="yearFilter" aria-label="契約期">
          <option value="">契約期すべて</option>
        </select>
        <select id="fieldFilter" aria-label="分類">
          <option value="">分類すべて</option>
        </select>
        <select id="officeFilter" aria-label="発注者">
          <option value="">発注者すべて</option>
        </select>
      </section>

      <section class="status-row">
        <span id="countLabel">0件</span>
        <span id="message" role="status"></span>
      </section>

      <section class="table-wrap" aria-label="業務一覧">
        <table>
          <thead>
            <tr>
              <th><button data-sort="number">業務番号</button></th>
              <th><button data-sort="name">業務名</button></th>
              <th><button data-sort="office">発注者</button></th>
              <th><button data-sort="field">分類</button></th>
              <th><button data-sort="contract_amount">契約金額</button></th>
              <th><button data-sort="start_date">開始日</button></th>
              <th><button data-sort="end_date">終了日</button></th>
              <th><button data-sort="revised_end_date">変更後終了日</button></th>
              <th><button data-sort="project_year">契約期</button></th>
              <th><button data-sort="fiscal_year">決算期</button></th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="projectRows"></tbody>
        </table>
      </section>
    </main>

    <dialog id="editorDialog">
      <form id="projectForm" method="dialog">
        <div class="dialog-head">
          <h2 id="dialogTitle">業務を編集</h2>
          <button class="icon-button" value="cancel" type="button" id="closeDialog" aria-label="閉じる">×</button>
        </div>
        <div class="form-grid">
          <label>年度<input name="fiscal_year" type="number" inputmode="numeric"></label>
          <label>決算年度<input name="fiscal_year_true" type="number" inputmode="numeric"></label>
          <label>業務番号<input name="number" required></label>
          <label class="wide">業務名<input name="name" required></label>
          <label>分類<input name="field"></label>
          <label>詳細分類<input name="subfield"></label>
          <label>分類番号<input name="field_number" type="number" inputmode="numeric"></label>
          <label>発注者<input name="office"></label>
          <label>開始日<input name="start_date" type="date"></label>
          <label>終了日<input name="end_date" type="date"></label>
          <label>変更後終了日<input name="revised_end_date" type="date"></label>
          <label>決算終了日<input name="fisical_end_date" type="date"></label>
          <label>契約金額<input name="contract_amount" type="number" inputmode="numeric" min="0" required></label>
        </div>
        <div class="dialog-actions">
          <button id="deleteButton" class="button danger" type="button">削除</button>
          <span></span>
          <button class="button secondary" type="button" id="cancelButton">キャンセル</button>
          <button class="button primary" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
